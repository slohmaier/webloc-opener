name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for dry-run build (e.g. 1.0.0). Tag pushes ignore this.'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          } else {
            $version = '${{ github.event.inputs.version }}'
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $version"

      - name: Publish ${{ matrix.rid }}
        shell: pwsh
        run: |
          dotnet publish WeblocOpener/WeblocOpener.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o out

      - name: Rename artifact
        shell: pwsh
        run: |
          $name = "webloc-opener-${{ steps.ver.outputs.version }}-${{ matrix.rid }}.exe"
          Move-Item out/webloc-opener.exe $name
          Get-Item $name | Select-Object Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: webloc-opener-${{ matrix.rid }}
          path: webloc-opener-*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" artifacts/*.exe \
            --repo "$REPO" \
            --title "$TAG" \
            --generate-notes
